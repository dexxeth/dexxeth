name: GitHub-Profile-3D-Contrib
on:
  schedule:
    - cron: "0 0 */8 * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.DEXXETH_METRICS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name dexxeth
          git config user.email 92373097+dexxeth@users.noreply.github.com
          git add -A .
          if git commit -m "chore: update 3D contribution images"; then
            git push
          fi
